<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STL Operations MIS Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #222636;
    --border: rgba(255,255,255,0.08);
    --text: #e8eaf0;
    --muted: #7c8299;
    --amber: #EF9F27;
    --amber2: #FAC775;
    --green: #1D9E75;
    --blue: #378ADD;
    --purple: #7F77DD;
    --red: #E24B4A;
    --coral: #D85A30;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .shell { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
  .hdr { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 20px; }
  .hdr-left h1 { font-size: 18px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .hdr-left p { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .badge { background: rgba(239,159,39,0.15); color: var(--amber); font-size: 11px; padding: 4px 12px; border-radius: 20px; font-weight: 500; border: 1px solid rgba(239,159,39,0.3); }
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; overflow-x: auto; }
  .tab { padding: 10px 20px; cursor: pointer; font-size: 13px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); white-space: nowrap; transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.act { color: var(--amber); border-bottom-color: var(--amber); font-weight: 500; }
  .tc { display: none; }
  .tc.act { display: block; }
  .kg { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 20px; }
  .kg2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 20px; }
  .kc { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .kl { font-size: 10px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.6px; }
  .kv { font-size: 22px; font-weight: 600; color: var(--text); }
  .ks { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .ku { color: var(--green); }
  .kd { color: var(--red); }
  .warn { background: rgba(228,75,74,0.08); border: 1px solid rgba(228,75,74,0.2); border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #f09595; margin-bottom: 16px; display: inline-block; }
  .sl { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
  .lr { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 10px; font-size: 11px; color: var(--muted); }
  .li { display: flex; align-items: center; gap: 5px; }
  .ls { width: 10px; height: 10px; border-radius: 2px; display: inline-block; flex-shrink: 0; }
  .cw { position: relative; width: 100%; }
  .msel { font-size: 13px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg2); color: var(--text); cursor: pointer; margin-bottom: 16px; }
  .msel:focus { outline: none; border-color: var(--amber); }
  .sec { margin-bottom: 24px; }
  select option { background: #1a1d27; }
  .updated { font-size: 11px; color: var(--muted); margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); text-align: right; }
</style>
</head>
<body>
<div class="shell">

  <div class="hdr">
    <div class="hdr-left">
      <h1>Sara Textiles Ltd — Operations MIS Dashboard</h1>
      <p>Nalagarh Plant &nbsp;·&nbsp; Oct 2025 – Feb 2026</p>
    </div>
    <span class="badge">4 months data</span>
  </div>

  <div class="tabs">
    <button class="tab act" onclick="showTab('ov')">Overview</button>
    <button class="tab" onclick="showTab('wv')">Weaving</button>
    <button class="tab" onclick="showTab('dh')">Dye House & Dispatch</button>
    <button class="tab" onclick="showTab('dt')">Downtime</button>
    <button class="tab" onclick="showTab('co')">Costs</button>
  </div>

</div>
</body></html>
